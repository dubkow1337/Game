<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TRON 3D: Кибер Арена</title>
    <style>
        * { margin: 0; padding: 0; }
        body { 
            overflow: hidden; 
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #050814;
            touch-action: none; 
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        
        #ui {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            color: #fff; font-size: 22px; font-weight: bold;
            background: rgba(5, 8, 20, 0.9); padding: 12px 35px;
            border: 2px solid #00ffff; border-radius: 20px;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.3), inset 0 0 30px rgba(0, 255, 255, 0.05);
            z-index: 10; text-align: center;
            display: flex; align-items: center; gap: 30px;
            backdrop-filter: blur(10px);
        }
        #p1Score { color: #00ffff; text-shadow: 0 0 20px #00ffff; font-size: 32px; }
        #p2Score { color: #ffaa00; text-shadow: 0 0 20px #ffaa00; font-size: 32px; }
        .score-label { opacity: 0.6; font-size: 14px; letter-spacing: 2px; }
        .vs { font-size: 24px; opacity: 0.3; }
        
        #message {
            position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%);
            color: #ff0055; font-size: 52px; font-weight: 900;
            text-shadow: 0 0 40px #ff0055, 0 0 80px #ff0055, 0 0 120px #ff0055;
            text-align: center; z-index: 10; pointer-events: none;
            opacity: 0; transition: opacity 0.5s;
            font-style: italic;
        }
        #message.show { opacity: 1; }

        #loading {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #00ffff; font-size: 24px; z-index: 30;
            background: rgba(0,0,0,0.9); padding: 30px 50px;
            border-radius: 15px; border: 2px solid #00ffff;
            text-align: center;
            box-shadow: 0 0 60px rgba(0, 255, 255, 0.2);
        }
        #loading .spinner {
            width: 50px; height: 50px;
            border: 3px solid transparent;
            border-top: 3px solid #00ffff;
            border-radius: 50%;
            margin: 15px auto 0;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        #dpad {
            position: absolute; bottom: 30px; right: 30px;
            width: 180px; height: 180px; z-index: 20;
            display: none;
        }
        .dbtn {
            position: absolute; width: 55px; height: 55px;
            background: rgba(0, 255, 255, 0.1); border: 2px solid #00ffff;
            border-radius: 12px; color: #00ffff; font-size: 26px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.15);
            cursor: pointer; transition: all 0.05s;
            touch-action: none;
            text-shadow: 0 0 10px #00ffff;
        }
        .dbtn:active { 
            background: rgba(0, 255, 255, 0.4); 
            box-shadow: 0 0 30px #00ffff; 
            transform: scale(0.92); 
        }
        #btnUp { top: 0; left: 62px; }
        #btnDown { bottom: 0; left: 62px; }
        #btnLeft { top: 62px; left: 0; }
        #btnRight { top: 62px; right: 0; }

        #info {
            position: absolute; bottom: 30px; left: 30px;
            color: rgba(255,255,255,0.2); font-size: 12px;
            z-index: 10; letter-spacing: 1px;
        }

        @media (max-width: 1024px) {
            #dpad { display: block; }
            #ui { font-size: 16px; padding: 8px 20px; gap: 15px; }
            #p1Score, #p2Score { font-size: 24px; }
            #message { font-size: 32px; }
        }
        @media (max-width: 600px) {
            #dpad { width: 140px; height: 140px; bottom: 20px; right: 20px; }
            .dbtn { width: 42px; height: 42px; font-size: 20px; }
            #btnUp { top: 0; left: 49px; }
            #btnDown { bottom: 0; left: 49px; }
            #btnLeft { top: 49px; left: 0; }
            #btnRight { top: 49px; right: 0; }
            #info { display: none; }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="ui">
        <span><span class="score-label">СИНИЙ</span><br><span id="p1Score">0</span></span>
        <span class="vs">⚡</span>
        <span><span class="score-label">ОРАНЖЕВЫЙ</span><br><span id="p2Score">0</span></span>
    </div>
    <div id="message"></div>
    <div id="loading">
        ⚡ ЗАГРУЗКА АРЕНЫ
        <div class="spinner"></div>
    </div>
    <div id="info">▼ TRON 3D // КИБЕР АРЕНА</div>

    <div id="dpad">
        <div class="dbtn" id="btnUp">▲</div>
        <div class="dbtn" id="btnLeft">◀</div>
        <div class="dbtn" id="btnRight">▶</div>
        <div class="dbtn" id="btnDown">▼</div>
    </div>

    <script>
        // ===== КОНФИГУРАЦИЯ =====
        const WIDTH = 70;   
        const HEIGHT = 40;  
        const TRAIL_LENGTH = 40;
        const CELL_SIZE = 0.9;

        // ===== СОСТОЯНИЕ =====
        let gameActive = false;
        let msgTimeout;
        let roundCount = 0;
        let gameInterval = null;

        // ===== THREE.JS СЦЕНА =====
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050814);
        scene.fog = new THREE.FogExp2(0x050814, 0.0035);

        const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 200);
        camera.position.set(0, 50, 60);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.body.appendChild(renderer.domElement);

        // ===== ОСВЕЩЕНИЕ =====
        const ambient = new THREE.AmbientLight(0x2233aa, 0.3);
        scene.add(ambient);

        const mainLight = new THREE.DirectionalLight(0xffeedd, 0.8);
        mainLight.position.set(40, 60, 40);
        mainLight.castShadow = true;
        mainLight.shadow.mapSize.width = 2048;
        mainLight.shadow.mapSize.height = 2048;
        mainLight.shadow.camera.near = 0.1;
        mainLight.shadow.camera.far = 150;
        mainLight.shadow.camera.left = -50;
        mainLight.shadow.camera.right = 50;
        mainLight.shadow.camera.top = 50;
        mainLight.shadow.camera.bottom = -50;
        scene.add(mainLight);

        const fillLight = new THREE.DirectionalLight(0x00ffff, 0.3);
        fillLight.position.set(-40, 20, -40);
        scene.add(fillLight);

        const rimLight = new THREE.DirectionalLight(0xff00aa, 0.2);
        rimLight.position.set(0, 10, -60);
        scene.add(rimLight);

        // ===== АРЕНА =====
        // Пол с текстурой сетки
        const floorGroup = new THREE.Group();
        
        const floorMat = new THREE.MeshStandardMaterial({ 
            color: 0x0a0f24, 
            roughness: 0.2, 
            metalness: 0.9,
            emissive: 0x050810,
            emissiveIntensity: 0.5
        });
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(WIDTH, HEIGHT), floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        floorGroup.add(floor);

        // Основная сетка
        const gridHelper = new THREE.GridHelper(Math.max(WIDTH, HEIGHT), Math.max(WIDTH, HEIGHT), 0x00ffff, 0x00ffff);
        gridHelper.position.y = 0.05;
        gridHelper.material.opacity = 0.15;
        gridHelper.material.transparent = true;
        floorGroup.add(gridHelper);

        // Дополнительная тонкая сетка
        const gridHelper2 = new THREE.GridHelper(Math.max(WIDTH, HEIGHT), Math.max(WIDTH, HEIGHT) * 2, 0x00ffff, 0x00ffff);
        gridHelper2.position.y = 0.03;
        gridHelper2.material.opacity = 0.05;
        gridHelper2.material.transparent = true;
        floorGroup.add(gridHelper2);

        scene.add(floorGroup);

        // ===== СТЕНЫ С НЕОНОМ =====
        function createWall(w, h, d, x, z, rotY = 0) {
            const group = new THREE.Group();
            
            // Основная стена
            const wallMat = new THREE.MeshStandardMaterial({ 
                color: 0x111630, 
                roughness: 0.2, 
                metalness: 0.9,
                emissive: 0x0a0f24,
                emissiveIntensity: 0.5
            });
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), wallMat);
            mesh.position.set(0, h/2, 0);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            group.add(mesh);

            // Верхний неон
            const neonMat = new THREE.MeshBasicMaterial({ color: 0x00ffff });
            const topLine = new THREE.Mesh(new THREE.BoxGeometry(w, 0.1, d + 0.2), neonMat);
            topLine.position.set(0, h, 0);
            group.add(topLine);

            // Нижний неон
            const bottomNeon = new THREE.MeshBasicMaterial({ color: 0xff00aa });
            const bottomLine = new THREE.Mesh(new THREE.BoxGeometry(w, 0.1, d + 0.2), bottomNeon);
            bottomLine.position.set(0, 0.05, 0);
            group.add(bottomLine);

            group.position.set(x, 0, z);
            group.rotation.y = rotY;
            scene.add(group);
            
            return group;
        }

        createWall(WIDTH, 4, 1.5, 0, HEIGHT/2);
        createWall(WIDTH, 4, 1.5, 0, -HEIGHT/2);
        createWall(1.5, 4, HEIGHT, -WIDTH/2, 0);
        createWall(1.5, 4, HEIGHT, WIDTH/2, 0);

        // ===== УГЛОВЫЕ СТОЛБЫ =====
        function createCornerPillar(x, z) {
            const group = new THREE.Group();
            
            // Основной столб
            const pillarMat = new THREE.MeshStandardMaterial({
                color: 0x111630,
                metalness: 0.9,
                roughness: 0.2,
                emissive: 0x0a0f24,
                emissiveIntensity: 0.3
            });
            const pillar = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.6, 4.5, 12), pillarMat);
            pillar.position.y = 2.25;
            pillar.castShadow = true;
            group.add(pillar);

            // Неоновое кольцо сверху
            const ringMat = new THREE.MeshBasicMaterial({ color: 0x00ffff });
            const ring = new THREE.Mesh(new THREE.TorusGeometry(0.7, 0.08, 8, 12), ringMat);
            ring.position.y = 4.3;
            ring.rotation.x = Math.PI / 2;
            group.add(ring);

            // Неоновое кольцо снизу
            const ringBottom = new THREE.Mesh(new THREE.TorusGeometry(0.7, 0.08, 8, 12), 
                new THREE.MeshBasicMaterial({ color: 0xff00aa }));
            ringBottom.position.y = 0.2;
            ringBottom.rotation.x = Math.PI / 2;
            group.add(ringBottom);

            // Светящаяся сфера на вершине
            const sphereMat = new THREE.MeshBasicMaterial({ color: 0x00ffff });
            const sphere = new THREE.Mesh(new THREE.SphereGeometry(0.25, 8, 8), sphereMat);
            sphere.position.y = 4.6;
            group.add(sphere);

            group.position.set(x, 0, z);
            scene.add(group);
        }

        const cornerPositions = [
            [-WIDTH/2, -HEIGHT/2], [WIDTH/2, -HEIGHT/2],
            [-WIDTH/2, HEIGHT/2], [WIDTH/2, HEIGHT/2]
        ];
        cornerPositions.forEach(([x, z]) => createCornerPillar(x, z));

        // ===== ДЕКОРАТИВНЫЕ ЭЛЕМЕНТЫ =====
        // Светящиеся линии на полу
        function createFloorLine(x1, z1, x2, z2, color = 0x00ffff, opacity = 0.1) {
            const points = [
                new THREE.Vector3(x1, 0.02, z1),
                new THREE.Vector3(x2, 0.02, z2)
            ];
            const geometry = new THREE.BufferGeometry().setFromPoints(points);
            const material = new THREE.LineBasicMaterial({ 
                color: color, 
                transparent: true, 
                opacity: opacity 
            });
            const line = new THREE.Line(geometry, material);
            scene.add(line);
        }

        // Диагональные линии
        createFloorLine(-WIDTH/2 + 2, -HEIGHT/2 + 2, WIDTH/2 - 2, HEIGHT/2 - 2, 0x00ffff, 0.08);
        createFloorLine(WIDTH/2 - 2, -HEIGHT/2 + 2, -WIDTH/2 + 2, HEIGHT/2 - 2, 0xff00aa, 0.08);

        // ===== ТРИБУНЫ =====
        function createTribune(angle, radius, width, height, depth) {
            const group = new THREE.Group();
            
            const mat = new THREE.MeshStandardMaterial({
                color: 0x080b18,
                roughness: 0.6,
                metalness: 0.3,
                emissive: 0x020408,
                emissiveIntensity: 0.5
            });
            
            // Основная трибуна
            const tribune = new THREE.Mesh(new THREE.BoxGeometry(width, height, depth), mat);
            tribune.position.y = height/2;
            tribune.castShadow = true;
            tribune.receiveShadow = true;
            group.add(tribune);

            // Неоновая подсветка трибуны
            const neonMat = new THREE.MeshBasicMaterial({ 
                color: Math.random() > 0.5 ? 0x00ffff : 0xff00aa,
                transparent: true,
                opacity: 0.3
            });
            const neonStrip = new THREE.Mesh(new THREE.BoxGeometry(width + 0.2, 0.05, depth + 0.2), neonMat);
            neonStrip.position.y = height + 0.05;
            group.add(neonStrip);

            // Случайные светящиеся точки на трибунах
            for (let i = 0; i < 8; i++) {
                const dotMat = new THREE.MeshBasicMaterial({ 
                    color: Math.random() > 0.5 ? 0x00ffff : 0xff00aa,
                    transparent: true,
                    opacity: 0.3 + Math.random() * 0.3
                });
                const dot = new THREE.Mesh(new THREE.SphereGeometry(0.1, 4, 4), dotMat);
                dot.position.set(
                    (Math.random() - 0.5) * width * 0.8,
                    height * 0.5 + Math.random() * height * 0.3,
                    (Math.random() - 0.5) * depth * 0.8
                );
                group.add(dot);
            }

            group.position.set(
                Math.cos(angle) * radius,
                0,
                Math.sin(angle) * radius
            );
            group.rotation.y = -angle + Math.PI / 2;
            scene.add(group);
        }

        // Размещаем трибуны по кругу
        for (let i = 0; i < 16; i++) {
            const angle = (i / 16) * Math.PI * 2;
            const radius = Math.max(WIDTH, HEIGHT) * 0.7 + 8;
            const width = 12 + Math.random() * 8;
            const height = 4 + Math.random() * 8;
            const depth = 8 + Math.random() * 6;
            createTribune(angle, radius, width, height, depth);
        }

        // ===== СОЗДАНИЕ БАЙКА В ВИДЕ КОНУСА =====
        function createBike(color) {
            const group = new THREE.Group();
            
            // Основной корпус - вытянутый конус (как мотоцикл TRON)
            const bodyMat = new THREE.MeshStandardMaterial({ 
                color: color, 
                metalness: 0.9, 
                roughness: 0.1,
                emissive: color,
                emissiveIntensity: 0.4
            });
            
            // Корпус - конус
            const body = new THREE.Mesh(new THREE.ConeGeometry(0.4, 1.6, 8), bodyMat);
            body.position.y = 0.3;
            body.rotation.x = Math.PI / 2;
            body.castShadow = true;
            group.add(body);

            // Передняя часть (сфера)
            const noseMat = new THREE.MeshStandardMaterial({
                color: 0xffffff,
                metalness: 0.9,
                roughness: 0.1,
                emissive: color,
                emissiveIntensity: 0.5
            });
            const nose = new THREE.Mesh(new THREE.SphereGeometry(0.3, 8, 8), noseMat);
            nose.position.set(0, 0.3, 0.8);
            group.add(nose);

            // Задняя часть
            const tailMat = new THREE.MeshStandardMaterial({
                color: color,
                metalness: 0.9,
                roughness: 0.1,
                emissive: color,
                emissiveIntensity: 0.3
            });
            const tail = new THREE.Mesh(new THREE.ConeGeometry(0.25, 0.6, 6), tailMat);
            tail.position.set(0, 0.3, -0.9);
            tail.rotation.x = Math.PI / 2;
            group.add(tail);

            // Фара (свет)
            const lightMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            const light = new THREE.Mesh(new THREE.SphereGeometry(0.1, 6, 6), lightMat);
            light.position.set(0, 0.4, 1.0);
            group.add(light);

            // Светящийся след
            const glowMat = new THREE.MeshBasicMaterial({ 
                color: color,
                transparent: true,
                opacity: 0.3
            });
            const glow = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.4, 0.3, 6), glowMat);
            glow.position.set(0, 0.1, -1.0);
            group.add(glow);

            // Боковые панели (для стиля)
            const panelMat = new THREE.MeshStandardMaterial({
                color: 0x111630,
                metalness: 0.9,
                roughness: 0.2,
                emissive: color,
                emissiveIntensity: 0.1
            });
            for (let side of [-1, 1]) {
                const panel = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.2, 0.8), panelMat);
                panel.position.set(side * 0.45, 0.3, 0);
                group.add(panel);
            }

            return group;
        }

        // ===== ИГРОКИ =====
        const players = [
            {
                color: 0x00ffff, trailColor: 0x00ffff, name: 'СИНИЙ',
                x: 12, y: Math.floor(HEIGHT/2), 
                dirX: 1, dirY: 0,
                trail: [], trailMeshes: [],
                alive: true, score: 0,
                mesh: null
            },
            {
                color: 0xffaa00, trailColor: 0xffaa00, name: 'ОРАНЖЕВЫЙ',
                x: WIDTH - 12, y: Math.floor(HEIGHT/2),
                dirX: -1, dirY: 0,
                trail: [], trailMeshes: [],
                alive: true, score: 0,
                mesh: null
            }
        ];

        // Создаем байки
        players.forEach(p => {
            p.mesh = createBike(p.color);
            scene.add(p.mesh);
            const pos = gridToScene(p.x, p.y);
            p.mesh.position.set(pos.x, 0.15, pos.z);
        });

        // ===== СЛЕДЫ (ПУЛ ОБЪЕКТОВ) =====
        const trailPool = [];

        function getTrailObject(color) {
            if (trailPool.length > 0) {
                const obj = trailPool.pop();
                obj.visible = true;
                obj.material.color.setHex(color);
                obj.material.emissive.setHex(color);
                return obj;
            }
            const geo = new THREE.BoxGeometry(CELL_SIZE, 0.15, CELL_SIZE);
            const mat = new THREE.MeshStandardMaterial({
                metalness: 0.9,
                roughness: 0.1,
                transparent: true,
                opacity: 0.8,
                emissiveIntensity: 0.6
            });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.y = 0.05;
            mesh.receiveShadow = true;
            scene.add(mesh);
            return mesh;
        }

        function recycleTrailObject(obj) {
            obj.visible = false;
            trailPool.push(obj);
        }

        // ===== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ =====
        function gridToScene(gx, gy) {
            return { x: gx - WIDTH/2, z: gy - HEIGHT/2 };
        }

        function showMessage(text, color = '#ff0055', duration = 2500) {
            const div = document.getElementById('message');
            div.textContent = text;
            div.style.color = color;
            div.style.textShadow = `0 0 40px ${color}, 0 0 80px ${color}, 0 0 120px ${color}`;
            div.classList.add('show');
            clearTimeout(msgTimeout);
            msgTimeout = setTimeout(() => div.classList.remove('show'), duration);
        }

        function isSafeCell(x, y, trail, enemyTrail) {
            if (x < 0.5 || x >= WIDTH - 0.5 || y < 0.5 || y >= HEIGHT - 0.5) return false;
            
            for (let t of trail) {
                if (Math.round(t.x) === Math.round(x) && Math.round(t.y) === Math.round(y)) return false;
            }
            for (let t of enemyTrail) {
                if (Math.round(t.x) === Math.round(x) && Math.round(t.y) === Math.round(y)) return false;
            }
            return true;
        }

        // ===== AI =====
        function aiMove() {
            if (!gameActive || !players[1].alive) return;
            
            const p = players[1];
            const enemy = players[0];
            const dirs = [
                { dx: 0, dy: -1 }, { dx: 0, dy: 1 },
                { dx: -1, dy: 0 }, { dx: 1, dy: 0 }
            ];
            
            const available = dirs.filter(d => {
                const nx = p.x + d.dx;
                const ny = p.y + d.dy;
                return isSafeCell(nx, ny, p.trail, enemy.trail);
            });

            if (available.length === 0) {
                const straight = { dx: p.dirX, dy: p.dirY };
                const nx = p.x + straight.dx;
                const ny = p.y + straight.dy;
                if (isSafeCell(nx, ny, p.trail, enemy.trail)) return;
                
                for (let d of dirs) {
                    const nx = p.x + d.dx;
                    const ny = p.y + d.dy;
                    if (isSafeCell(nx, ny, p.trail, enemy.trail)) {
                        p.dirX = d.dx;
                        p.dirY = d.dy;
                        return;
                    }
                }
                return;
            }

            let bestScore = -Infinity;
            let bestDir = available[0];

            for (let d of available) {
                let score = 0;
                let simX = p.x + d.dx;
                let simY = p.y + d.dy;
                
                let steps = 0;
                const simTrail = [...p.trail, { x: simX, y: simY }];
                let cx = simX, cy = simY;
                let dx = d.dx, dy = d.dy;
                
                for (let i = 0; i < 12; i++) {
                    const nextDirs = [
                        { dx: dx, dy: dy },
                        { dx: dy, dy: dx },
                        { dx: -dy, dy: -dx }
                    ];
                    let moved = false;
                    for (let nd of nextDirs) {
                        const nx = cx + nd.dx;
                        const ny = cy + nd.dy;
                        if (isSafeCell(nx, ny, simTrail, enemy.trail)) {
                            cx = nx; cy = ny;
                            simTrail.push({ x: cx, y: cy });
                            dx = nd.dx; dy = nd.dy;
                            steps++;
                            moved = true;
                            break;
                        }
                    }
                    if (!moved) break;
                }

                const distToEnemy = Math.abs(cx - enemy.x) + Math.abs(cy - enemy.y);
                score += steps * 20;
                score += (35 - distToEnemy) * 2;
                
                if (cx < 3 || cx > WIDTH - 3 || cy < 3 || cy > HEIGHT - 3) {
                    score -= 15;
                }

                if (score > bestScore) {
                    bestScore = score;
                    bestDir = d;
                }
            }

            p.dirX = bestDir.dx;
            p.dirY = bestDir.dy;
        }

        // ===== ОСНОВНОЙ ИГРОВОЙ ЦИКЛ =====
        function updateGame() {
            if (!gameActive) return;

            players.forEach((p) => {
                if (!p.alive) return;

                p.x += p.dirX;
                p.y += p.dirY;

                if (p.x < 0 || p.x >= WIDTH || p.y < 0 || p.y >= HEIGHT) {
                    p.alive = false;
                    p.x = Math.max(0, Math.min(WIDTH - 1, p.x));
                    p.y = Math.max(0, Math.min(HEIGHT - 1, p.y));
                    return;
                }

                p.trail.push({ x: p.x, y: p.y });

                const pos = gridToScene(p.x, p.y);
                const trailMesh = getTrailObject(p.trailColor);
                trailMesh.material.color.setHex(p.trailColor);
                trailMesh.material.emissive.setHex(p.trailColor);
                trailMesh.position.set(pos.x, 0.05, pos.z);
                p.trailMeshes.push(trailMesh);

                if (p.trail.length > TRAIL_LENGTH) {
                    p.trail.shift();
                    const oldMesh = p.trailMeshes.shift();
                    if (oldMesh) recycleTrailObject(oldMesh);
                }

                if (p.mesh) {
                    p.mesh.position.set(pos.x, 0.15, pos.z);
                    
                    // Поворот байка
                    if (p.dirX === 1) p.mesh.rotation.y = Math.PI / 2;
                    else if (p.dirX === -1) p.mesh.rotation.y = -Math.PI / 2;
                    else if (p.dirY === 1) p.mesh.rotation.y = 0;
                    else if (p.dirY === -1) p.mesh.rotation.y = Math.PI;
                }
            });

            checkCollisions();

            document.getElementById('p1Score').textContent = players[0].score;
            document.getElementById('p2Score').textContent = players[1].score;

            aiMove();
        }

        function checkCollisions() {
            players.forEach((p) => {
                if (!p.alive) return;
                
                for (let i = 0; i < p.trail.length - 2; i++) {
                    const t = p.trail[i];
                    if (Math.round(t.x) === Math.round(p.x) && Math.round(t.y) === Math.round(p.y)) {
                        p.alive = false;
                        break;
                    }
                }
            });

            if (players[0].alive) {
                for (let t of players[1].trail) {
                    if (Math.round(t.x) === Math.round(players[0].x) && 
                        Math.round(t.y) === Math.round(players[0].y)) {
                        players[0].alive = false;
                        break;
                    }
                }
            }

            if (players[1].alive) {
                for (let t of players[0].trail) {
                    if (Math.round(t.x) === Math.round(players[1].x) && 
                        Math.round(t.y) === Math.round(players[1].y)) {
                        players[1].alive = false;
                        break;
                    }
                }
            }

            if (players[0].alive && players[1].alive) {
                if (Math.round(players[0].x) === Math.round(players[1].x) && 
                    Math.round(players[0].y) === Math.round(players[1].y)) {
                    players[0].alive = false;
                    players[1].alive = false;
                }
            }

            const alive = players.filter(p => p.alive);
            if (alive.length === 0) {
                endRound(null);
            } else if (alive.length === 1) {
                endRound(alive[0]);
            }
        }

        function endRound(winner) {
            if (!gameActive) return;
            gameActive = false;
            
            if (winner) {
                winner.score++;
                const color = winner.color === 0x00ffff ? '#00ffff' : '#ffaa00';
                showMessage(`🏆 ${winner.name} ПОБЕДИЛ!`, color, 2500);
                if (winner.mesh) {
                    winner.mesh.traverse((child) => {
                        if (child.isMesh && child.material && child.material.emissive) {
                            child.material.emissiveIntensity = 3;
                            setTimeout(() => { 
                                child.material.emissiveIntensity = 0.4; 
                            }, 1000);
                        }
                    });
                }
            } else {
                showMessage('💥 ВЗАИМНОЕ УНИЧТОЖЕНИЕ!', '#ff00ff', 2500);
            }

            setTimeout(() => {
                resetRound();
            }, 2500);
        }

        function resetRound() {
            players.forEach(p => {
                p.trailMeshes.forEach(m => recycleTrailObject(m));
                p.trail = [];
                p.trailMeshes = [];
                p.alive = true;
            });

            players[0].x = 12;
            players[0].y = Math.floor(HEIGHT/2);
            players[0].dirX = 1;
            players[0].dirY = 0;
            
            players[1].x = WIDTH - 12;
            players[1].y = Math.floor(HEIGHT/2);
            players[1].dirX = -1;
            players[1].dirY = 0;

            // Обновляем позиции
            players.forEach(p => {
                const pos = gridToScene(p.x, p.y);
                if (p.mesh) {
                    p.mesh.position.set(pos.x, 0.15, pos.z);
                    if (p.dirX === 1) p.mesh.rotation.y = Math.PI / 2;
                    else if (p.dirX === -1) p.mesh.rotation.y = -Math.PI / 2;
                    else if (p.dirY === 1) p.mesh.rotation.y = 0;
                    else if (p.dirY === -1) p.mesh.rotation.y = Math.PI;
                }
            });

            gameActive = true;
            roundCount++;
        }

        // ===== УПРАВЛЕНИЕ =====
        function changeDirection(player, turn) {
            if (!gameActive) return;
            const p = players[player];
            if (!p.alive) return;

            if (turn === 'up' && p.dirY !== 1) { 
                p.dirX = 0; 
                p.dirY = -1; 
            }
            else if (turn === 'down' && p.dirY !== -1) { 
                p.dirX = 0; 
                p.dirY = 1; 
            }
            else if (turn === 'left' && p.dirX !== 1) { 
                p.dirX = -1; 
                p.dirY = 0; 
            }
            else if (turn === 'right' && p.dirX !== -1) { 
                p.dirX = 1; 
                p.dirY = 0; 
            }
        }

        document.addEventListener('keydown', (e) => {
            const key = e.key;
            if (key === 'ArrowUp' || key === 'w' || key === 'ц') {
                e.preventDefault();
                changeDirection(0, 'up');
            }
            else if (key === 'ArrowDown' || key === 's' || key === 'ы') {
                e.preventDefault();
                changeDirection(0, 'down');
            }
            else if (key === 'ArrowLeft' || key === 'a' || key === 'ф') {
                e.preventDefault();
                changeDirection(0, 'left');
            }
            else if (key === 'ArrowRight' || key === 'd' || key === 'в') {
                e.preventDefault();
                changeDirection(0, 'right');
            }
        });

        document.getElementById('btnUp').addEventListener('touchstart', (e) => { 
            e.preventDefault(); 
            changeDirection(0, 'up'); 
        }, {passive: false});
        document.getElementById('btnDown').addEventListener('touchstart', (e) => { 
            e.preventDefault(); 
            changeDirection(0, 'down'); 
        }, {passive: false});
        document.getElementById('btnLeft').addEventListener('touchstart', (e) => { 
            e.preventDefault(); 
            changeDirection(0, 'left'); 
        }, {passive: false});
        document.getElementById('btnRight').addEventListener('touchstart', (e) => { 
            e.preventDefault(); 
            changeDirection(0, 'right'); 
        }, {passive: false});

        // ===== АНИМАЦИЯ =====
        function animate() {
            requestAnimationFrame(animate);
            
            const time = Date.now() * 0.001;
            
            // Анимация неоновых элементов
            scene.children.forEach(child => {
                if (child.isMesh && child.material && child.material.color) {
                    if (child.material.color.getHex() === 0x00ffff && child.material.opacity !== undefined) {
                        child.material.opacity = 0.6 + Math.sin(time * 2 + child.position.x + child.position.z) * 0.3;
                    }
                    if (child.material.color.getHex() === 0xff00aa && child.material.opacity !== undefined) {
                        child.material.opacity = 0.6 + Math.sin(time * 2.5 + child.position.x - child.position.z) * 0.3;
                    }
                }
            });

            renderer.render(scene, camera);
        }

        // ===== РАЗМЕР ОКНА =====
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // ===== ЗАПУСК =====
        function startGame() {
            document.getElementById('loading').style.display = 'none';
            if (gameInterval) clearInterval(gameInterval);
            gameInterval = setInterval(updateGame, 50);
            gameActive = true;
            console.log('🎮 TRON 3D: Кибер Арена запущена!');
            console.log('🏍️ Управление: ↑↓←→ / WASD');
            console.log('⚡ Схватка началась!');
        }

        // Стартуем через секунду для загрузки
        setTimeout(startGame, 1000);
        animate();
    </script>
</body>
</html>
