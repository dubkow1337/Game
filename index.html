<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моя первая 3D игра</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        #ui { position: absolute; top: 10px; left: 10px; color: white; font-size: 20px; font-weight: bold; text-shadow: 1px 1px 3px black; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="ui">Счёт: <span id="score">0</span></div>

    <script>
        // 1. Создание сцены, камеры и рендера
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111122);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 2. Освещение
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 20, 15);
        scene.add(dirLight);

        // 3. Создание игрового поля (платформы)
        const floorGeo = new THREE.BoxGeometry(30, 0.5, 30);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        scene.add(floor);

        // 4. Игрок (3D-куб)
        const playerGeo = new THREE.BoxGeometry(1.5, 1.5, 1.5);
        const playerMat = new THREE.MeshStandardMaterial({ color: 0x00ff00 });
        const player = new THREE.Mesh(playerGeo, playerMat);
        player.position.y = 1;
        scene.add(player);

        // 5. Цель (3D-сфера)
        const targetGeo = new THREE.SphereGeometry(0.7, 32, 32);
        const targetMat = new THREE.MeshStandardMaterial({ color: 0xff0000 });
        const target = new THREE.Mesh(targetGeo, targetMat);
        moveTarget();
        scene.add(target);

        // Настройка камеры
        camera.position.set(0, 15, 20);
        camera.lookAt(player.position);

        // Логика игры
        let score = 0;
        const keys = { w: false, a: false, s: false, d: false };
        const speed = 0.2;

        function moveTarget() {
            target.position.set(
                (Math.random() - 0.5) * 24,
                0.7,
                (Math.random() - 0.5) * 24
            );
        }

        // Управление
        window.addEventListener('keydown', (e) => { if(e.key.toLowerCase() in keys) keys[e.key.toLowerCase()] = true; });
        window.addEventListener('keyup', (e) => { if(e.key.toLowerCase() in keys) keys[e.key.toLowerCase()] = false; });

        // Главный цикл игры (обновление кадров)
        function animate() {
            requestAnimationFrame(animate);

            // Движение игрока
            if (keys.w && player.position.z > -14) player.position.z -= speed;
            if (keys.s && player.position.z < 14) player.position.z += speed;
            if (keys.a && player.position.x > -14) player.position.x -= speed;
            if (keys.d && player.position.x < 14) player.position.x += speed;

            // Вращение сферы для красоты
            target.rotation.y += 0.02;

            // Проверка столкновения (игрок съел сферу)
            const distance = player.position.distanceTo(target.position);
            if (distance < 1.5) {
                score++;
                document.getElementById('score').innerText = score;
                moveTarget();
            }

            // Камера плавно следует за игроком
            camera.position.x = player.position.x;
            camera.position.z = player.position.z + 18;

            renderer.render(scene, camera);
        }

        // Подгонка под размер экрана при изменении окна
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
