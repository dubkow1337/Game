<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TRON 3D: Кибер Арена</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <!-- ИНТЕРФЕЙС -->
    <div id="ui">
        <span><span class="score-label">СИНИЙ</span><br><span id="p1Score">0</span></span>
        <span class="vs">⚡</span>
        <span><span class="score-label">ОРАНЖЕВЫЙ</span><br><span id="p2Score">0</span></span>
    </div>

    <div id="message"></div>
    <div id="loading">⚡ ЗАГРУЗКА АРЕНЫ<div class="spinner"></div></div>
    <div id="info">▼ TRON 3D // КИБЕР АРЕНА</div>

    <!-- D-PAD -->
    <div id="dpad">
        <div class="dbtn" id="btnUp">▲</div>
        <div class="dbtn" id="btnLeft">◀</div>
        <div class="dbtn" id="btnRight">▶</div>
        <div class="dbtn" id="btnDown">▼</div>
    </div>

    <!-- СКРИПТЫ -->
    <script src="js/utils.js"></script>
    <script src="js/sounds.js"></script>
    <script src="js/player.js"></script>
    <script src="js/ai.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/render.js"></script>
    <script src="js/game.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
