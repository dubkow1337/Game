<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TRON 3D: Кибер Арена</title>
    <style>
        * { margin: 0; padding: 0; }
        body { 
            overflow: hidden; 
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #050814;
            touch-action: none; 
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        
        #ui {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            color: #fff; font-size: 20px; font-weight: bold;
            background: rgba(5, 8, 20, 0.85); padding: 8px 25px;
            border: 2px solid #00ffff; border-radius: 15px;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
            z-index: 10; text-align: center;
            display: flex; align-items: center; gap: 20px;
            backdrop-filter: blur(5px);
        }
        #p1Score { color: #00ffff; text-shadow: 0 0 15px #00ffff; font-size: 28px; }
        #p2Score { color: #ffaa00; text-shadow: 0 0 15px #ffaa00; font-size: 28px; }
        .score-label { opacity: 0.6; font-size: 14px; }
        
        #message {
            position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%);
            color: #ff0055; font-size: 48px; font-weight: 900;
            text-shadow: 0 0 30px #ff0055, 0 0 60px #ff0055;
            text-align: center; z-index: 10; pointer-events: none;
            opacity: 0; transition: opacity 0.5s;
        }
        #message.show { opacity: 1; }

        #loading {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #00ffff; font-size: 24px; z-index: 30;
            background: rgba(0,0,0,0.8); padding: 20px 40px;
            border-radius: 10px; border: 2px solid #00ffff;
        }

        #dpad {
            position: absolute; bottom: 30px; right: 30px;
            width: 180px; height: 180px; z-index: 20;
            display: none;
        }
        .dbtn {
            position: absolute; width: 55px; height: 55px;
            background: rgba(0, 255, 255, 0.1); border: 2px solid #00ffff;
            border-radius: 12px; color: #00ffff; font-size: 26px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.15);
            cursor: pointer; transition: all 0.05s;
            touch-action: none;
        }
        .dbtn:active { 
            background: rgba(0, 255, 255, 0.4); 
            box-shadow: 0 0 30px #00ffff; 
            transform: scale(0.92); 
        }
        #btnUp { top: 0; left: 62px; }
        #btnDown { bottom: 0; left: 62px; }
        #btnLeft { top: 62px; left: 0; }
        #btnRight { top: 62px; right: 0; }

        @media (max-width: 1024px) {
            #dpad { display: block; }
            #ui { font-size: 16px; padding: 6px 15px; gap: 10px; }
        }
        @media (max-width: 600px) {
            #dpad { width: 140px; height: 140px; bottom: 20px; right: 20px; }
            .dbtn { width: 42px; height: 42px; font-size: 20px; }
            #btnUp { top: 0; left: 49px; }
            #btnDown { bottom: 0; left: 49px; }
            #btnLeft { top: 49px; left: 0; }
            #btnRight { top: 49px; right: 0; }
            #message { font-size: 28px; }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="ui">
        <span><span class="score-label">СИНИЙ</span><br><span id="p1Score">0</span></span>
        <span style="font-size:24px; opacity:0.3;">⚡</span>
        <span><span class="score-label">ОРАНЖЕВЫЙ</span><br><span id="p2Score">0</span></span>
    </div>
    <div id="message"></div>
    <div id="loading">⏳ ЗАГРУЗКА...</div>

    <div id="dpad">
        <div class="dbtn" id="btnUp">▲</div>
        <div class="dbtn" id="btnLeft">◀</div>
        <div class="dbtn" id="btnRight">▶</div>
        <div class="dbtn" id="btnDown">▼</div>
    </div>

    <script>
        // ===== КОНФИГУРАЦИЯ =====
        const WIDTH = 70;   
        const HEIGHT = 40;  
        const TRAIL_LENGTH = 35;

        // ===== СОСТОЯНИЕ =====
        let gameActive = false;
        let msgTimeout;
        let roundCount = 0;
        let gameInterval = null;

        // ===== THREE.JS СЦЕНА =====
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050814);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 200);
        camera.position.set(0, 45, 55);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // ===== ОСВЕЩЕНИЕ =====
        const ambient = new THREE.AmbientLight(0x2233aa, 0.4);
        scene.add(ambient);

        const mainLight = new THREE.DirectionalLight(0xffffff, 1);
        mainLight.position.set(30, 50, 30);
        mainLight.castShadow = true;
        mainLight.shadow.mapSize.width = 1024;
        mainLight.shadow.mapSize.height = 1024;
        scene.add(mainLight);

        const fillLight = new THREE.DirectionalLight(0x00ffff, 0.5);
        fillLight.position.set(-30, 20, -30);
        scene.add(fillLight);

        // ===== АРЕНА =====
        const floorGeo = new THREE.PlaneGeometry(WIDTH, HEIGHT);
        const floorMat = new THREE.MeshStandardMaterial({ 
            color: 0x0a0f24, 
            roughness: 0.3, 
            metalness: 0.9,
            emissive: 0x050810,
            emissiveIntensity: 0.2
        });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        const gridHelper = new THREE.GridHelper(Math.max(WIDTH, HEIGHT), Math.max(WIDTH, HEIGHT), 0x00ffff, 0x00ffff);
        gridHelper.position.y = 0.02;
        gridHelper.material.opacity = 0.3;
        gridHelper.material.transparent = true;
        scene.add(gridHelper);

        // Стены
        function createWall(w, h, d, x, z, rotY = 0) {
            const group = new THREE.Group();
            const wallMat = new THREE.MeshStandardMaterial({ 
                color: 0x111630, 
                roughness: 0.3, 
                metalness: 0.8,
                emissive: 0x0a0f24,
                emissiveIntensity: 0.3
            });
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), wallMat);
            mesh.position.set(0, h/2, 0);
            mesh.castShadow = true;
            group.add(mesh);

            const neonMat = new THREE.MeshBasicMaterial({ color: 0x00ffff });
            const topLine = new THREE.Mesh(new THREE.BoxGeometry(w, 0.15, d + 0.1), neonMat);
            topLine.position.set(0, h, 0);
            group.add(topLine);

            const bottomNeon = new THREE.MeshBasicMaterial({ color: 0xff00aa });
            const bottomLine = new THREE.Mesh(new THREE.BoxGeometry(w, 0.15, d + 0.1), bottomNeon);
            bottomLine.position.set(0, 0.1, 0);
            group.add(bottomLine);

            group.position.set(x, 0, z);
            group.rotation.y = rotY;
            scene.add(group);
        }

        createWall(WIDTH, 3, 1.2, 0, HEIGHT/2);
        createWall(WIDTH, 3, 1.2, 0, -HEIGHT/2);
        createWall(1.2, 3, HEIGHT, -WIDTH/2, 0);
        createWall(1.2, 3, HEIGHT, WIDTH/2, 0);

        // ===== ИГРОКИ =====
        const players = [
            {
                color: 0x00ffff, trailColor: 0x00ffff, name: 'СИНИЙ',
                x: 12, y: Math.floor(HEIGHT/2), 
                dirX: 1, dirY: 0,
                trail: [], trailMeshes: [],
                alive: true, score: 0,
                mesh: null
            },
            {
                color: 0xffaa00, trailColor: 0xffaa00, name: 'ОРАНЖЕВЫЙ',
                x: WIDTH - 12, y: Math.floor(HEIGHT/2),
                dirX: -1, dirY: 0,
                trail: [], trailMeshes: [],
                alive: true, score: 0,
                mesh: null
            }
        ];

        // Пулы объектов для следов
        const trailPool = [];

        function getTrailObject() {
            if (trailPool.length > 0) {
                const obj = trailPool.pop();
                obj.visible = true;
                return obj;
            }
            const geo = new THREE.BoxGeometry(0.8, 0.2, 0.8);
            const mat = new THREE.MeshStandardMaterial({
                metalness: 0.9,
                roughness: 0.1,
                transparent: true,
                opacity: 0.7
            });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.y = 0.1;
            scene.add(mesh);
            return mesh;
        }

        function recycleTrailObject(obj) {
            obj.visible = false;
            trailPool.push(obj);
        }

        // ===== СОЗДАНИЕ ПРОСТЫХ БАЙКОВ =====
        function createSimpleBike(color) {
            const group = new THREE.Group();
            
            const body = new THREE.Mesh(
                new THREE.BoxGeometry(0.6, 0.4, 1.4),
                new THREE.MeshStandardMaterial({ 
                    color: color, 
                    metalness: 0.9, 
                    roughness: 0.1, 
                    emissive: color, 
                    emissiveIntensity: 0.3 
                })
            );
            body.position.y = 0.3;
            body.castShadow = true;
            group.add(body);

            const cockpit = new THREE.Mesh(
                new THREE.SphereGeometry(0.25, 8, 8),
                new THREE.MeshStandardMaterial({ 
                    color: 0xffffff, 
                    emissive: color, 
                    emissiveIntensity: 0.5 
                })
            );
            cockpit.position.set(0, 0.5, 0.3);
            group.add(cockpit);

            return group;
        }

        // ===== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ =====
        function gridToScene(gx, gy) {
            return { x: gx - WIDTH/2, z: gy - HEIGHT/2 };
        }

        function showMessage(text, color = '#ff0055', duration = 2500) {
            const div = document.getElementById('message');
            div.textContent = text;
            div.style.color = color;
            div.style.textShadow = `0 0 30px ${color}, 0 0 60px ${color}`;
            div.classList.add('show');
            clearTimeout(msgTimeout);
            msgTimeout = setTimeout(() => div.classList.remove('show'), duration);
        }

        function isSafeCell(x, y, trail, enemyTrail) {
            if (x < 0.5 || x >= WIDTH - 0.5 || y < 0.5 || y >= HEIGHT - 0.5) return false;
            
            for (let t of trail) {
                if (Math.round(t.x) === Math.round(x) && Math.round(t.y) === Math.round(y)) return false;
            }
            for (let t of enemyTrail) {
                if (Math.round(t.x) === Math.round(x) && Math.round(t.y) === Math.round(y)) return false;
            }
            return true;
        }

        // ===== AI =====
        function aiMove() {
            if (!gameActive || !players[1].alive) return;
            
            const p = players[1];
            const enemy = players[0];
            const dirs = [
                { dx: 0, dy: -1 }, { dx: 0, dy: 1 },
                { dx: -1, dy: 0 }, { dx: 1, dy: 0 }
            ];
            
            const available = dirs.filter(d => {
                const nx = p.x + d.dx;
                const ny = p.y + d.dy;
                return isSafeCell(nx, ny, p.trail, enemy.trail);
            });

            if (available.length === 0) {
                const straight = { dx: p.dirX, dy: p.dirY };
                const nx = p.x + straight.dx;
                const ny = p.y + straight.dy;
                if (isSafeCell(nx, ny, p.trail, enemy.trail)) return;
                
                for (let d of dirs) {
                    const nx = p.x + d.dx;
                    const ny = p.y + d.dy;
                    if (isSafeCell(nx, ny, p.trail, enemy.trail)) {
                        p.dirX = d.dx;
                        p.dirY = d.dy;
                        return;
                    }
                }
                return;
            }

            let bestScore = -Infinity;
            let bestDir = available[0];

            for (let d of available) {
                let score = 0;
                let simX = p.x + d.dx;
                let simY = p.y + d.dy;
                
                let steps = 0;
                const simTrail = [...p.trail, { x: simX, y: simY }];
                let cx = simX, cy = simY;
                let dx = d.dx, dy = d.dy;
                
                for (let i = 0; i < 10; i++) {
                    const nextDirs = [
                        { dx: dx, dy: dy },
                        { dx: dy, dy: dx },
                        { dx: -dy, dy: -dx }
                    ];
                    let moved = false;
                    for (let nd of nextDirs) {
                        const nx = cx + nd.dx;
                        const ny = cy + nd.dy;
                        if (isSafeCell(nx, ny, simTrail, enemy.trail)) {
                            cx = nx; cy = ny;
                            simTrail.push({ x: cx, y: cy });
                            dx = nd.dx; dy = nd.dy;
                            steps++;
                            moved = true;
                            break;
                        }
                    }
                    if (!moved) break;
                }

                const distToEnemy = Math.abs(cx - enemy.x) + Math.abs(cy - enemy.y);
                score += steps * 15;
                score += (30 - distToEnemy) * 2;
                
                if (cx < 2 || cx > WIDTH - 2 || cy < 2 || cy > HEIGHT - 2) {
                    score -= 10;
                }

                if (score > bestScore) {
                    bestScore = score;
                    bestDir = d;
                }
            }

            p.dirX = bestDir.dx;
            p.dirY = bestDir.dy;
        }

        // ===== ОСНОВНОЙ ИГРОВОЙ ЦИКЛ =====
        function updateGame() {
            if (!gameActive) return;

            players.forEach((p, idx) => {
                if (!p.alive) return;

                p.x += p.dirX;
                p.y += p.dirY;

                if (p.x < 0 || p.x >= WIDTH || p.y < 0 || p.y >= HEIGHT) {
                    p.alive = false;
                    p.x = Math.max(0, Math.min(WIDTH - 1, p.x));
                    p.y = Math.max(0, Math.min(HEIGHT - 1, p.y));
                    return;
                }

                p.trail.push({ x: p.x, y: p.y });

                const pos = gridToScene(p.x, p.y);
                const trailMesh = getTrailObject();
                trailMesh.material.color.setHex(p.trailColor);
                trailMesh.material.emissive.setHex(p.trailColor);
                trailMesh.material.emissiveIntensity = 0.6;
                trailMesh.position.set(pos.x, 0.1, pos.z);
                p.trailMeshes.push(trailMesh);

                if (p.trail.length > TRAIL_LENGTH) {
                    p.trail.shift();
                    const oldMesh = p.trailMeshes.shift();
                    if (oldMesh) recycleTrailObject(oldMesh);
                }

                if (p.mesh) {
                    p.mesh.position.set(pos.x, 0.2, pos.z);
                    
                    if (p.dirX === 1) p.mesh.rotation.y = Math.PI / 2;
                    else if (p.dirX === -1) p.mesh.rotation.y = -Math.PI / 2;
                    else if (p.dirY === 1) p.mesh.rotation.y = 0;
                    else if (p.dirY === -1) p.mesh.rotation.y = Math.PI;
                }
            });

            checkCollisions();

            document.getElementById('p1Score').textContent = players[0].score;
            document.getElementById('p2Score').textContent = players[1].score;

            aiMove();
        }

        function checkCollisions() {
            players.forEach((p, idx) => {
                if (!p.alive) return;
                
                for (let i = 0; i < p.trail.length - 2; i++) {
                    const t = p.trail[i];
                    if (Math.round(t.x) === Math.round(p.x) && Math.round(t.y) === Math.round(p.y)) {
                        p.alive = false;
                        break;
                    }
                }
            });

            if (players[0].alive) {
                for (let t of players[1].trail) {
                    if (Math.round(t.x) === Math.round(players[0].x) && 
                        Math.round(t.y) === Math.round(players[0].y)) {
                        players[0].alive = false;
                        break;
                    }
                }
            }

            if (players[1].alive) {
                for (let t of players[0].trail) {
                    if (Math.round(t.x) === Math.round(players[1].x) && 
                        Math.round(t.y) === Math.round(players[1].y)) {
                        players[1].alive = false;
                        break;
                    }
                }
            }

            if (players[0].alive && players[1].alive) {
                if (Math.round(players[0].x) === Math.round(players[1].x) && 
                    Math.round(players[0].y) === Math.round(players[1].y)) {
                    players[0].alive = false;
                    players[1].alive = false;
                }
            }

            const alive = players.filter(p => p.alive);
            if (alive.length === 0) {
                endRound(null);
            } else if (alive.length === 1) {
                endRound(alive[0]);
            }
        }

        function endRound(winner) {
            if (!gameActive) return;
            gameActive = false;
            
            if (winner) {
                winner.score++;
                const color = winner.color === 0x00ffff ? '#00ffff' : '#ffaa00';
                showMessage(`🏆 ${winner.name} ПОБЕДИЛ!`, color, 2500);
                if (winner.mesh) {
                    winner.mesh.traverse((child) => {
                        if (child.isMesh && child.material) {
                            child.material.emissiveIntensity = 2;
                            setTimeout(() => { child.material.emissiveIntensity = 0.3; }, 1000);
                        }
                    });
                }
            } else {
                showMessage('💥 ВЗАИМНОЕ УНИЧТОЖЕНИЕ!', '#ff00ff', 2500);
            }

            setTimeout(() => {
                resetRound();
            }, 2500);
        }

        function resetRound() {
            players.forEach(p => {
                p.trailMeshes.forEach(m => recycleTrailObject(m));
                p.trail = [];
                p.trailMeshes = [];
                p.alive = true;
            });

            players[0].x = 12;
            players[0].y = Math.floor(HEIGHT/2);
            players[0].dirX = 1;
            players[0].dirY = 0;
            
            players[1].x = WIDTH - 12;
            players[1].y = Math.floor(HEIGHT/2);
            players[1].dirX = -1;
            players[1].dirY = 0;

            gameActive = true;
            roundCount++;
        }

        // ===== УПРАВЛЕНИЕ =====
        function changeDirection(player, turn) {
            if (!gameActive) return;
            const p = players[player];
            if (!p.alive) return;

            if (turn === 'up' && p.dirY !== 1) { 
                p.dirX = 0; 
                p.dirY = -1; 
            }
            else if (turn === 'down' && p.dirY !== -1) { 
                p.dirX = 0; 
                p.dirY = 1; 
            }
            else if (turn === 'left' && p.dirX !== 1) { 
                p.dirX = -1; 
                p.dirY = 0; 
            }
            else if (turn === 'right' && p.dirX !== -1) { 
                p.dirX = 1; 
                p.dirY = 0; 
            }
        }

        document.addEventListener('keydown', (e) => {
            const key = e.key;
            if (key === 'ArrowUp' || key === 'w' || key === 'ц') {
                e.preventDefault();
                changeDirection(0, 'up');
            }
            else if (key === 'ArrowDown' || key === 's' || key === 'ы') {
                e.preventDefault();
                changeDirection(0, 'down');
            }
            else if (key === 'ArrowLeft' || key === 'a' || key === 'ф') {
                e.preventDefault();
                changeDirection(0, 'left');
            }
            else if (key === 'ArrowRight' || key === 'd' || key === 'в') {
                e.preventDefault();
                changeDirection(0, 'right');
            }
        });

        document.getElementById('btnUp').addEventListener('touchstart', (e) => { 
            e.preventDefault(); 
            changeDirection(0, 'up'); 
        }, {passive: false});
        document.getElementById('btnDown').addEventListener('touchstart', (e) => { 
            e.preventDefault(); 
            changeDirection(0, 'down'); 
        }, {passive: false});
        document.getElementById('btnLeft').addEventListener('touchstart', (e) => { 
            e.preventDefault(); 
            changeDirection(0, 'left'); 
        }, {passive: false});
        document.getElementById('btnRight').addEventListener('touchstart', (e) => { 
            e.preventDefault(); 
            changeDirection(0, 'right'); 
        }, {passive: false});

        // ===== АНИМАЦИЯ =====
        function animate() {
            requestAnimationFrame(animate);
            
            const time = Date.now() * 0.001;
            scene.children.forEach(child => {
                if (child.isMesh && child.material && child.material.color && 
                    child.material.color.getHex() === 0x00ffff) {
                    child.material.opacity = 0.7 + Math.sin(time + child.position.x) * 0.3;
                }
            });

            renderer.render(scene, camera);
        }

        // ===== РАЗМЕР ОКНА =====
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // ===== ИНИЦИАЛИЗАЦИЯ =====
        function initGame() {
            // Создаем простые байки для обоих игроков
            players.forEach(p => {
                const bike = createSimpleBike(p.color);
                p.mesh = bike;
                scene.add(bike);
                
                const pos = gridToScene(p.x, p.y);
                bike.position.set(pos.x, 0.2, pos.z);
            });

            gameActive = true;
            document.getElementById('loading').style.display = 'none';
            
            // Запускаем игровой цикл
            if (gameInterval) clearInterval(gameInterval);
            gameInterval = setInterval(updateGame, 50);
            
            console.log('🎮 TRON 3D Кибер Арена запущена!');
            console.log('🎯 Управление: ↑↓←→ / WASD');
        }

        // Запускаем игру
        setTimeout(initGame, 500);
        animate();
    </script>
</body>
</html>
