<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TRON 3D: Cyber Arena Elite</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Подключаем библиотеку Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="ui"><span id="p1Score">0</span> : <span id="p2Score">0</span></div>
    <div id="message"></div>

    <div id="dpad">
        <div class="dbtn" id="btnUp">▲</div>
        <div class="dbtn" id="btnLeft">◀</div>
        <div class="dbtn" id="btnRight">▶</div>
        <div class="dbtn" id="btnDown">▼</div>
    </div>

    <!-- Подключаем модули игры в строгом порядке зависимости -->
    <script src="js/utils.js"></script>
    <script src="js/player.js"></script>
    <script src="js/ai.js"></script>
    <script src="js/sounds.js"></script>
    <script src="js/bonuses.js"></script>
    <script src="js/boss.js"></script>
    <script src="js/survival.js"></script>
    <script src="js/render.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/game.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
