<!DOCTYPE html> 
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TRON 3D: Кибер Арена</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #050814;
            touch-action: none; 
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        #ui { 
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            color: #ffffff; font-size: 24px; font-weight: bold; letter-spacing: 2px;
            background: rgba(5, 8, 20, 0.75); padding: 10px 30px; border: 2px solid #00ffff;
            border-radius: 20px; box-shadow: 0 0 15px rgba(0, 255, 255, 0.4); z-index: 10; 
            text-align: center; min-width: 250px;
        }
        #p1Score { color: #00ffff; text-shadow: 0 0 10px #00ffff; }
        #p2Score { color: #ffaa00; text-shadow: 0 0 10px #ffaa00; }
        
        #message { 
            position: absolute; top: 35%; left: 50%; transform: translate(-50%, -50%); 
            color: #ff0055; font-size: 42px; font-weight: 900; letter-spacing: 3px;
            text-shadow: 0 0 20px #ff0055; text-align: center; z-index: 10; pointer-events: none; 
            font-style: italic;
        }

        /* ВИРТУАЛЬНЫЙ ДЖОЙСТИК (D-PAD) */
        #dpad {
            position: absolute; bottom: 30px; right: 30px;
            width: 160px; height: 160px; z-index: 20;
            display: none;
        }
        .dbtn {
            position: absolute; width: 50px; height: 50px;
            background: rgba(0, 255, 255, 0.15); border: 2px solid #00ffff;
            border-radius: 12px; color: #00ffff; font-size: 24px; font-weight: bold;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.2);
            cursor: pointer; transition: all 0.1s ease;
        }
        .dbtn:active { background: rgba(0, 255, 255, 0.5); box-shadow: 0 0 20px #00ffff; transform: scale(0.95); }
        #btnUp { top: 0; left: 55px; }
        #btnDown { bottom: 0; left: 55px; }
        #btnLeft { top: 55px; left: 0; }
        #btnRight { top: 55px; right: 0; }

        @media (max-width: 1024px) {
            #dpad { display: block; }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="ui"><span id="p1Score">0</span> : <span id="p2Score">0</span></div>
    <div id="message"></div>

    <div id="dpad">
        <div class="dbtn" id="btnUp">▲</div>
        <div class="dbtn" id="btnLeft">◀</div>
        <div class="dbtn" id="btnRight">▶</div>
        <div class="dbtn" id="btnDown">▼</div>
    </div>

    <script>
        const WIDTH = 80;   
        const HEIGHT = 48;  

        let gameActive = true;
        let opponentType = 'ai'; 
        let msgTimeout;

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x02040a);
        scene.fog = new THREE.FogExp2(0x02040a, 0.015);

        const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.15);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0x00ffff, 0.6);
        dirLight.position.set(20, 40, 20);
        scene.add(dirLight);

        const topLight = new THREE.PointLight(0xff00aa, 1.2, 100);
        topLight.position.set(0, 30, 0);
        scene.add(topLight);

        const floorGeo = new THREE.PlaneGeometry(WIDTH, HEIGHT);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x0a0f24, roughness: 0.2, metalness: 0.8 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        const gridHelper = new THREE.GridHelper(WIDTH, WIDTH, 0xff00aa, 0x00ffff);
        gridHelper.position.y = 0.01;
        scene.add(gridHelper);

        const wallGroup = new THREE.Group();
        const wallHeight = 4;
        const wallThick = 1.5;
        const wallMat = new THREE.MeshStandardMaterial({ color: 0x111630, roughness: 0.4, metalness: 0.7 });
        const neonWallMat = new THREE.MeshBasicMaterial({ color: 0x00ffff });

        function createArenaWall(w, h, d, x, z, rotateY = 0) {
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), wallMat);
            mesh.position.set(x, h/2, z);
            mesh.rotation.y = rotateY;
            wallGroup.add(mesh);

            const neonLine = new THREE.Mesh(new THREE.BoxGeometry(w, 0.2, d + 0.1), neonWallMat);
            neonLine.position.set(x, h, z);
            neonLine.rotation.y = rotateY;
            wallGroup.add(neonLine);
        }

        createArenaWall(WIDTH, wallHeight, wallThick, 0, HEIGHT/2);
        createArenaWall(WIDTH, wallHeight, wallThick, 0, -HEIGHT/2);
        createArenaWall(wallThick, wallHeight, HEIGHT, -WIDTH/2, 0);
        createArenaWall(wallThick, wallHeight, HEIGHT, WIDTH/2, 0);
        scene.add(wallGroup);

        const standsGroup = new THREE.Group();
        for(let i = 0; i < 12; i++) {
            const standGeo = new THREE.BoxGeometry(15, 8 + Math.random()*12, 15);
            const standMat = new THREE.MeshStandardMaterial({ color: 0x080b18, roughness: 0.5 });
            const stand = new THREE.Mesh(standGeo, standMat);
            const angle = (i / 12) * Math.PI * 2;
            stand.position.set(Math.cos(angle) * (WIDTH * 0.8), 0, Math.sin(angle) * (HEIGHT * 1.2));
            standsGroup.add(stand);
        }
        scene.add(standsGroup);

        function createBikeModel(colorHex) {
            const group = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.6, 1.8), new THREE.MeshStandardMaterial({ color: colorHex, metalness: 0.9, roughness: 0.1 }));
            body.position.y = 0.3;
            group.add(body);
            const light = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.15, 0.2), new THREE.MeshBasicMaterial({ color: 0xffffff }));
            light.position.set(0, 0.4, 0.85);
            group.add(light);
            return group;
        }

        const players = [
            { 
                color: 0x00ffff, trailColor: 0x00ffff, name: 'Синий', 
                x: 15, y: Math.floor(HEIGHT / 2), dirX: 1, dirY: 0, 
                trail: [], alive: true, score: 0,
                mesh: createBikeModel(0x00ffff), trailMeshes: []
            },
            { 
                color: 0xffaa00, trailColor: 0xffaa00, name: 'Оранжевый', 
                x: WIDTH - 15, y: Math.floor(HEIGHT / 2), dirX: -1, dirY: 0, 
                trail: [], alive: true, score: 0,
                mesh: createBikeModel(0xffaa00), trailMeshes: []
            }
        ];

        players.forEach(p => scene.add(p.mesh));

        function gridToScene(gx, gy) {
            return { x: gx - WIDTH / 2, z: gy - HEIGHT / 2 };
        }

        function showMessage(msg) {
            const div = document.getElementById('message');
            div.innerText = msg;
            clearTimeout(msgTimeout);
            msgTimeout = setTimeout(() => div.innerText = '', 3000);
        }

        function isSafeCell(x, y, trail, enemyTrail) {
            if (x < 1 || x >= WIDTH - 1 || y < 1 || y >= HEIGHT - 1) return false;
            for (let p of trail) if (Math.round(p.x) === Math.round(x) && Math.round(p.y) === Math.round(y)) return false;
            for (let p of enemyTrail) if (Math.round(p.x) === Math.round(x) && Math.round(p.y) === Math.round(y)) return false;
            return true;
        }

        function aiMove() {
            if (!players[1].alive || opponentType !== 'ai') return;
            const p = players[1];
            const enemy = players[0];
            const dirs = [{ dx: 0, dy: -1 }, { dx: 0, dy: 1 }, { dx: -1, dy: 0 }, { dx: 1, dy: 0 }];
            let moveScores = [];

            for (const dir of dirs) {
                let newX = p.x + dir.dx;
                let newY = p.y + dir.dy;
                if (!isSafeCell(newX, newY, p.trail, enemy.trail)) {
                    moveScores.push({ dir: dir, score: -999 });
                    continue;
                }
                let simX = newX, simY = newY, steps = 0;
                let simTrail = [...p.trail, { x: Math.round(simX), y: Math.round(simY) }];
                for (let step = 0; step < 30; step++) {
                    let nextX = simX + dir.dx;
                    let nextY = simY + dir.dy;
                    if (isSafeCell(nextX, nextY, simTrail, enemy.trail)) {
                        simX = nextX; simY = nextY;
                        simTrail.push({ x: simX, y: simY });
                        steps++;
                    } else break;
                }
                const distToEnemy = Math.abs(simX - enemy.x) + Math.abs(simY - enemy.y);
                moveScores.push({ dir: dir, score: steps * 10 + (30 - distToEnemy) });
            }
            moveScores.sort((a, b) => b.score - a.score);
            if (moveScores[0] && moveScores[0].score > -999) {
                p.dirX = moveScores[0].dir.dx;
                p.dirY = moveScores[0].dir.dy;
            }
        }

        function updateGame() {
            if (!gameActive) return;

            aiMove(); 

            players.forEach((p) => {
                if (!p.alive) return;

                p.x += p.dirX;
                p.y += p.dirY;
                p.trail.push({ x: p.x, y: p.y });

                const pos = gridToScene(p.x, p.y);
                
                const wallGeo = new THREE.BoxGeometry(0.9, 1.4, 0.9);
                const wallMat = new THREE.MeshStandardMaterial({ 
                    color: p.trailColor, 
                    emissive: p.trailColor, 
                    emissiveIntensity: 0.8,
                    transparent: true,
                    opacity: 0.7
                });
                const trailBlock = new THREE.Mesh(wallGeo, wallMat);
                trailBlock.position.set(pos.x, 0.7, pos.z);
                scene.add(trailBlock);
                p.trailMeshes.push(trailBlock);

                if (p.trail.length > 35) {
                    p.trail.shift();
                    const oldMesh = p.trailMeshes.shift();
                    scene.remove(oldMesh);
                }

                p.mesh.position.set(pos.x, 0, pos.z);
                
                if (p.dirX === 1) p.mesh.rotation.y = Math.PI / 2;
                if (p.dirX === -1) p.mesh.rotation.y = -Math.PI / 2;
                if (p.dirY === 1) p.mesh.rotation.y = 0;
                if (p.dirY === -1) p.mesh.rotation.y = Math.PI;

                if (p.x < 1 || p.x >= WIDTH - 1 || p.y < 1 || p.y >= HEIGHT - 1) {
                    p.alive = false;
                }
                
                players.forEach(other => {
                    other.trail.forEach((t, tIdx) => {
                        if (other === p && tIdx >= p.trail.length - 2) return;
                        if (Math.round(t.x) === Math.round(p.x) && Math.round(t.y) === Math.round(p.y)) {
                            p.alive = false;
                        }
                    });
                });
            });

            const alive = players.filter(p => p.alive);
            if (alive.length === 1) {
                gameActive = false;
                alive[0].score++;
                document.getElementById('p1Score').innerText = players[0].score;
                document.getElementById('p2Score').innerText = players[1].score;
                showMessage("🏆 ПОБЕДА ИГРОКА: " + alive[0].name.toUpperCase());
                setTimeout(resetGame, 2500);
            } else if (alive.length === 0) {
                gameActive = false;
                showMessage('💥 ВЗАИМНОЕ УНИЧТОЖЕНИЕ!');
                setTimeout(resetGame, 2500);
            }
        }

        function resetGame() {
            players.forEach(p => {
                p.trail.forEach((t, i) => scene.remove(p.trailMeshes[i]));
                p.trail = []; p.trailMeshes = []; p.alive = true;
            });
            players[0].x = 15; players[0].y = Math.floor(HEIGHT / 2); players[0].dirX = 1; players[0].dirY = 0;
            players[1].x = WIDTH - 15; players[1].y = Math.floor(HEIGHT / 2); players[1].dirX = -1; players[1].dirY = 0;
            gameActive = true;
        }

        function changeDirection(turn) {
            if (!gameActive) return;
            const p1 = players[0];
            if (turn === 'up' && p1.dirY !== 1) { p1.dirX = 0; p1.dirY = -1; }
            if (turn === 'down' && p1.dirY !== -1) { p1.dirX = 0; p1.dirY = 1; }
            if (turn === 'left' && p1.dirX !== 1) { p1.dirX = -1; p1.dirY = 0; }
            if (turn === 'right' && p1.dirX !== -1) { p1.dirX = 1; p1.dirY = 0; }
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowUp' || e.key.toLowerCase() === 'w') changeDirection('up');
            if (e.key === 'ArrowDown' || e.key.toLowerCase() === 's') changeDirection('down');
            if (e.key === 'ArrowLeft' || e.key.toLowerCase() === 'a') changeDirection('left');
            if (e.key === 'ArrowRight' || e.key.toLowerCase() === 'd') changeDirection('right');
        });

        document.getElementById('btnUp').addEventListener('touchstart', (e) => { e.preventDefault(); changeDirection('up'); }, {passive: false});
        document.getElementById('btnDown').addEventListener('touchstart', (e) => { e.preventDefault(); changeDirection('down'); }, {passive: false});
        document.getElementById('btnLeft').addEventListener('touchstart', (e) => { e.preventDefault(); changeDirection('left'); }, {passive: false});
        document.getElementById('btnRight').addEventListener('touchstart', (e) => { e.preventDefault(); changeDirection('right'); }, {passive: false});

        setInterval(updateGame, 75);

        function animate() {
            requestAnimationFrame(animate);

            const p1Pos = players[0].mesh.position;
            const targetCamX = p1Pos.x - players[0].dirX * 14;
            const targetCamZ = p1Pos.z - players[0].dirY * 14;
            
            camera.position.x += (targetCamX - camera.position.x) * 0.1;
            camera.position.y += (9 - camera.position.y) * 0.1;
            camera.position.z += (targetCamZ - camera.position.z) * 0.1;
            
            camera.lookAt(p1Pos.x + players[0].dirX * 4, 1, p1Pos.z + players[0].dirY * 4);

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
